 par_industrial:0 "Paraguayan Industries"
 par_industrial_desc:0 "Movamos las industrias..."
 par_revolucion:0 "Revolucion Febrerista"
 par_revolucion_desc:0 "No queremos un presidente pacifista e incapaz, pueblo y militares abandonados, revolucion ahora! "
 par_something_wrong:0 "Something Smells Fishy"
 par_something_wrong_desc:0 "We heard rumours of a coup last weeks, we need to do something and prevent this happening, at all cost..."
 par_secure_democracy:0 "Secure Democracy"
 par_secure_democracy_desc:0 "asdasda"
 par_revo_reforms:0 "Agrarian Reform"
 par_revo_reforms_desc:0 "Our population is not that big, we need more manpower. Efficiency is the key. Less farmers but more technology in the farms, reforms and benefits for our working class."
 par_revo_reforms2:0 "A New Constitution"
 par_revo_reforms2_desc:0 "New laws, army reforms, economic reforms, social reforms, labour reforms, paid soldiers and veterans. This is the paraguayan revolution!."
 par_the_guarani:0 "The Guarani"
 par_the_guarani_desc:0 "A strong country needs a strong currency."
 par_sov_mission:0 "Mission to the Soviet Union"
 par_sov_mission_desc:0 "The Soviet Union is the home of the revolution, we have to strengthen our diplomatic relations."
 par_old_army:0 "The Old Army"
 par_old_army_desc:0 "After the Chaco War, our army was practically disbanded. We need those veterans back now that the armed forces are more attractive."
 par_mil_reform:0 "Renewed Armed Forces"
 par_mil_reform_desc:0 "Our army was in tatters after the war, no one wanted to fight. We need to change that and make it more appealing to the people. We need new and loyal officers in charge. We need a professional army"
 par_mil_reform2:0 "Modernization"
 par_mil_reform2_desc:0 "We suffered in the Chaco War due to poor equipment and leadership. We need to modernize our Air force aswell as our Army infantry equipment."
