l_english:
 ROM_a_new_kingdom:0 "A new Kingdom" 
 a_new_kingdom_desc:0 "The King, Carol II announced that starting today he will assume the entire responsibility, together with his parliament, to lead the new kingdom of Romania. Long live the king!" 
 ROM_the_path_for_glory_desc:0 "With the establishment of King Carol II's regime, he decided to provide royal funds for the industrial development of the Kingdom. The path for Glory has begun!"
 ROM_the_path_for_glory:0 "The Path for Glory!"
 ROM_arms_for_the_king:0 "Arms for the King!"
 ROM_goods_for_the_kingdom:0 "Goods for the Kingdom"
 ROM_arms_for_the_king_desc:0 "We shall build our armies again, but first we need guns to serve the King and the Kingdom!"
 ROM_goods_for_the_kingdom_desc:0 "The citizens of the new kingdom of Romania need the most attention, therefore, new factories will be inaugurated as a processing of common needs."
 ROM_the_muntenian_railways:0 "The Muntenian Railways"
 ROM_the_muntenian_railways_desc:0"The new railways will be inaugurated soon, the first being the Muntenian ones."
 ROM_the_moldovian_railways:0 "The Moldovian Railways"
 ROM_the_moldovian_railways_desc:0 "After so much time to wait, the Moldovian railways are open at last!"
 ROM_the_transylvanian_railways:0 "The Transylvanian Railways"
 ROM_the_transylvanian_railways_desc:0 "We can say that we are proud of Romanian engineering! Our railways cross the Great Carpathians!"
 ROM_securitatea:0 "Siguranta"
 ROM_securitatea_desc:0 "Siguranta or rather the Secret Intelligence Service aims to protect our citizens who are or are not of Romanian ethnicity, they have the absolute control of the Law and the Forces of Justice"
 ROM_unite_the_balkans_under_the_crown:0 "Unite the Balkans under the Crown"
 ROM_unite_the_balkans_under_the_crown_desc:0 "Today the Balkans are finaly stabilized under a single flag, a single country, a single crown ... the Romanian one together we will succeed in creating a new European Empire which will protect its population at any cost!"
 ROM_war_with_yugoslavia:0 "Phase Three"
 ROM_war_with_yugoslavia_desc:0 "Phase Three it can be said that it is the most difficult plan of the four days that you have to execute carefully "
 ROM_war_with_bulgaria:0"Phase Two"
 ROM_war_with_bulgaria_desc:0 "Phase Two will start soon and with this Bulgaria will be ours, we could say that this is the beginning of the third Balkan war"
 ROM_war_with_hunagry_desc:0 "Phase One its the beginning of the King's grand plan, a grand one to bring peace to the Balkan Peninsula"
 ROM_war_with_hunagry:0 "Phase One"
 ROM_war_with_greace_desc:0 "Phase Four and the last consists in the conquest of a former empire and at the same time one of the first peoples of Europe"
 ROM_war_with_greace:0 "Phase Four"
 ROM_inform_the_people:0 "Infrom the People!"
 ROM_inform_the_people_desc:0 "We should inform the inhabitants of the Kingdom of the King's plans so that they will join him on the road to victory and peace"
 ROM_inform_the_generals:0 "Infrom the Generals"
 ROM_inform_the_generals_desc:0 "The great Commanders and Generals of the nation must be notified immediately to begin organizing battle plans!"
 ROM_the_sentinel:0 "The Sentinel of the Motherland"
 ROM_the_sentinel_desc:0 "Long live King Carol II! He is the sentinel of the motherland and with his own will we will succeed!"
 ROM_to_war_we_march:0 "Towards war we march!"
 ROM_to_war_we_march_desc:0 "With each passing day, the geographical and geopolitical position of the Kingdom it shotens its longevity, so the king decided that the best thing for the Kingdom but also for its inhabitants is to start an expansion campaign only than!"
 ROM_bucharest_radio:0 "Radio Bucharest"
 ROM_bucharest_radio_desc:0 "The new radio-post Radio Bucharest is now live on air and informs the people with everything is happening in the country"
 ROM_bucharest_university_of_science:0 "The University of Science from Bucharest"
 ROM_bucharest_university_of_science_desc:0 "The University is now open and ready to help the Kingdom to develop in the next decate."
 ROM_crown_the_son:0 "Crown the Son"
 ROM_crown_the_son_desc:0 "King Carol II abdicated in favor of his son, Prince Mihai, who today becomes the new King of the Kingdom of Romania, the long life of King Mihai I"
 ROM_the_technology_path:0 "The Path of Technology"
 ROM_the_technology_path_desc:0 "This is our path to technology,The Kingdom had an explosion of culture but also of enlightened minds in the last 20 years, today we will put into operation all these enlightened minds to open a new path ... one towards science and evolution!"
 ROM_expand_the_carpathian_resourcers:0 "Expan the Carpathian resources"
 ROM_expand_the_carpathian_resourcers_desc:0 "The Carpathian Mountains are rich in various natural resources from gold to iron, with the help of these resources we will produce one of the most refined steel models."
 ROM_expand_the_oil_production:0 "Expand the Industrial Oil production"
 ROM_expand_the_oil_production_desc:0 "The time has come to expand the production of industrial oil in the city of Ploiesti but also in other regions of the country rich in "black gold"."
 ROM_the_kings_army:0 "The King's Army!"
 ROM_the_kings_army_desc:0 "This will be the personal army of the King which will aim to protect his majesty but also the borders of the kingdom, long life of the King!"
 ROM_new_weapons:0 "New Weapons of the 20th Century"
 ROM_new_weapons_desc:0 "Our great weapon manufacturers promised the kingdom new weapons to use against the enemies of the kingdom but also for its defense"
 ROM_new_at_guns:0 "New Anti-Tank field guns"
 ROM_new_at_guns_desc:0 "With the new Anti-Tank field guns we will pierce the enemy armor in a matter of seconds, this is truly the best defense weapon type in the army"
 ROM_armor:0 "New Tank Variants"
 ROM_armor_desc:0 "We have started the research program for new Armor varients, in a few months we will have the first prototypes!"
 ROM_study_defense_guns:0 "Study defense guns"
 ROM_study_defense_guns_desc:0 "The time has come to study new defense guns for the purpose to protect our borders from the enemies"
 ROM_general_field_training:0 "General's field training exercices"
 ROM_general_field_training_desc:0 "We must let our generals to train on field so they could master the art of manouver and combat"
 ROM_the_iar:0 "The  F.A.R.R"
 ROM_new_airplanes:0 "New Airplanes"
 ROM_airports_for_civis:0 "Satisfy the pilots"
 ROM_airports_for_arms:0 "Bucharest International Airport"
 ROM_new_ace_policy:0 "New Ace Policy"
 ROM_renovate_peles_castle:0 "Renovate the Peles Castle"
 ROM_agrarian_reform:0 "Agrarian Reform"
 ROM_the_iar_desc:0 "The Romanian Royal Air Force provides support to ground forces, performs air reconnaissance and defends the country's territory from enemy forces during the wa "
 ROM_new_airplanes_desc:0 "Our top ingineers will start working on developing new engines, guns, fighters and bombers to help our ground forces in the upcoming wars"
 ROM_airports_for_civis_desc:0 "Our pilots complain that the Kingdom lacks certain factors of air defense plus airport necessary for the large number of aircraft needed to protect our state, we only need to start building new defensive structures and airports"
 ROM_airports_for_arms_desc:0 "Baneasa Airport is the first in Romania in terms of passenger traffic, and will be restored "
 ROM_new_ace_policy_desc:0 "Our aces will continue to fly until the total victory and along the way they will train new recruits who will inherit their title."
 ROM_agrarian_reform_desc:0 "The King has started reforms that will help the peasantry in growing more crops by giving them more lands to farm and more tools to use"
 ROM_renovate_peles_castle_desc:0 "The King ordered for the renovation of his new personal Castle, Peles"
 ROM_defend_the_people:0 "Defend the People of The Kingdom!"
 ROM_defend_the_people_desc:0 "We must Defend our Poeple at any cost, we shall improve our Home Defense!"
 ROM_the_national_airports_program:0 "The National Airports Program"
 ROM_the_national_airports_program_desc:0 "The King has started Investing in more National Airports across The Kingdom"
 ROM_invest_in_set:0 "Invest in S.E.T."
 ROM_invest_in_set_desc:0 "The time to Invest in S.E.T. has come, this company will help The Kingdom in the future wars!"
 ROM_invest_in_iar:0 "Invest in  I.A.R."
 ROM_invest_in_iar_desc:0 "The time to Invest in I.A.R. has come this company will help The Kingdom in the future wars!"
 ROM_proclaim_a_new_kingdom:0 "Proclaim a New Kingdom of Europe"
 ROM_proclaim_a_new_kingdom_desc:0 "The time has come to declare the New Kingdom of Romania! It already includes the Balkans and Asia Minor, the King's Long Life!"          
 ROM_a_grand_capital:0 "A Grand Capital!"
 ROM_a_grand_capital_desc:0 "The capital of the Kingdom will be Rebuilt to offer the Kingdom as a center of Culture, Victory and Technology"
 ROM_expand_the_factories_of_the_kingdom:0 "Exapnd the Factories of The Kingdom"
 ROM_expand_the_factories_of_the_kingdom_desc:0 "It is time to invest in the Territories won during the Unification War and the Third Balkan War"
 ROM_open_the_iasi_museum:0 "Open the National History Musuem in Iasi"
 ROM_open_the_iasi_museum_desc:0 "The National Museum Complex „Moldova” is a national museum from Iași, located in Ștefan cel Mare şi Sfânt Square no. 1. The museum complex is based in the Palace of Culture in Iasi, an architectural monument built in neo-Gothic style"
 ROM_a_grand_campign:0 "A Grand Campaign!"
 ROM_a_grand_camping:0 "The king ordered the planning of a new Great Conquest Campaign, this time in the Western Territories"
 ROM_parade_at_alba_iulia:0 "The march to Alba Iulia"
 ROM_parade_at_alba_iulia_desc:0 "We will organize a march to Alba Iulia as on December 1, 1918 but this time to crown the King as King of the Balkans"
 ROM_rebuilt_the_kingdom:0 "Rebuilding The Kingdom"
 ROM_rebuilt_the_kingdom_desc:0 "After so many wars the Kingdom must be rebuilt from scratch but this time it will be rebuilt stronger and better."
 ROM_fortify_the_east:0 "Fortify the East Border"
 ROM_fortify_the_east_desc:0 "We must fortify the eastern border of the Kingdom to ensure that we will not be greeted by more adversaries than predicted."
 ROM_invade_the_germans:0 "Invade the Germans!"
 ROM_invade_the_germans_desc:0 "We will start by invading South East Germany and then we will march to Berlin under the new Arc de Triomphe"
 ROM_invade_the_italians:0 "Invade the Italians!"
 ROM_invade_the_italians_desc:0 "The Italians are our Latin brothers, this will be a war for the liberation and unification of the Latin peoples of Europe, for this purpose we will be able to have a dystopia without wars or conflicts."
 ROM_the_navy:0 "The F.N.R.R"
 ROM_the_navy_desc:0 "The F.N.R.R or Fortele Navale Regale ale Romaniei are the Navy the will be built to serve the King and the people"
 ROM_the_navy_idea:0 "The Romanian Navy"
 ROM_the_navy_idea_desc:0 " "Order Macelariu to rise the flags on the Constanta Shipyard immediatly!" - The King "
 ROM_the_navy_harbour1:0 "Constanta ShipYard"
 ROM_the_navy_harbour2:0 "Constanta ShipYard Expansion"
 ROM_the_navy_harbour1_desc:0 "The re-opening of the Constanta ShipYard will happen soon! We must celebrate with champagne!"
 ROM_the_navy_harbour2_desc:0 "After the re-opening of the ShipYard we are already expanding it into 4 more Harbors"
 ROM_the_navy_destroyers:0 "Romanian Destroyers"
 ROM_the_navy_submarines:0 "Romanian Submarines"
 ROM_the_navy_destroyers_desc:0 "New Romanian Made Destroyer Models will be ready soon to be send to the ShipYards!"
 ROM_the_navy_submarines_desc:0 "New Romanian Made Subamrines Models will be ready soon to be send to the ShipYards!"
 ROM_the_navy_tactics:0 "New Navy Tactics"
 ROM_the_navy_tactics_desc:0 "Our Admirals started to Develop new Strategies to apply on the Great Seas"
 ROM_the_navy_battleships_cruiser:0 "New Battleships-Cruisers"
 ROM_the_navy_battleships_cruiser_desc:0 "The New Models of the Battleships and Cruisers will be soon ready to be sent to the Shipyards"
 ROM_the_navy_airforce:0 "The Naval F.A.R.R."
 ROM_the_navy_airforce_desc:0 "We requested some Air Models from the F.A.R.R."
 ROM_the_navy_carrier:0 "The Naval Carriers"
 ROM_the_navy_carrier_desc:0 "The First Naval Carriers Projects will be ready to be desplayed soon"
