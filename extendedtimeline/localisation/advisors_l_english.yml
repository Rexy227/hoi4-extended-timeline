carol_2_desc:0 "Carol is the first born of King Ferdinand I of Romania and his wife, Queen Maria, gaining by birth the title of Prince of Hohenzollern-Sigmaringen."
malaxa_1_desc:0 "Nicolae Malaxa is an Romanian engineer and entrepreneur, one of the most important industrialists of The Kingdom of Romania. At the same time, for some, Malaxa is a controversial figure due to his political sympathies"
ion_gigurtu_desc:0 "Gigurtu is a businessman, general manager of the company "Mica", specialized in the extraction of gold and other precious metals."
corneliu_codreanu_desc:0 "Corneliu Zelea Codreanu, at birth Corneliu Zelinski is the charismatic leader of the Romanian fascist extreme right, of the Archangel Michael Legion movement and of the political party resulting from the movement, the Iron Guard, from interwar Romania.  "
tatarescu_desc:0 "Gheorghe Tătărăscu was the Prime Minister of Romania during 1934-1936. Gheorghe Tătărăscu also held other ministerial portfolios; he witnessed the accusation in the trial of Lucrețiu Pătrășcanu."
sima_desc:0 "Horia Sima was a Romanian language high school teacher, Romanian legionary politician, president of the fascist-oriented party Iron Guard, commander of the Legionary Movement, a paramilitary organization."
leonida_desc:0 "Leonida Works is one of the best Tank Destroyers and medium Tanks company in The Kingdom"
set_desc:0 "The technical operations company or S.E.T. engineer "Grigore Zamfirescu", is a line of Romanian aeronautical factories in Bucharest, established at the initiative of engineer Grigore Zamfirescu."
cugir1_desc:0 "Uzinele Metalurgice Copsa Mica si Cugir (UMCM Cugir) is a state-owned company in Cugir, Romania, producing weapons. It was founded in 1799, during the Habsburg Empire, being one of the most experienced weapons companies."
romarm_desc:0 "RomArm is a state-owned arms company in Romania. It is the main Romanian supplier of defense equipmen"
cfr_desc:0 "Căile Ferate Române is Romania's national railway transport company. CFR, as an institution, was founded in 1880, after the first railway on the current territory of Romania was opened in 1854"
teodorini_desc:0 "Corneliu Teodorini is a great army Theorist and is an essential part of the Romanian High Command"
ROM_ioan_palaghita_desc:0 "Iona Palaghita is a good general and a great tactician"
ROM_alexandru_serbanescu_desc:0 "Alexandru Serbanescu is one of the best aviators in the hole Kingdom"
ROM_corneliu_teodorini_desc:0 "Corneliu Teodorini is a great army Theorist and is an essential part of the Romanian High Command"
nicolae_tataranu_desc:0 "Nicolae Tataranu is one of the best generals that could be chosen in an offensive war"

