l_english:

 bol_blame_military_hc:0 "Blame the Military High Command"
 bol_blame_military_hc_desc:0 "If there is a reason why we lost the war its definitely because of the terrible and undisciplined military high command." 
 bol_the_only_reason:0 "There is Only One Reason"
 bol_the_only_reason_desc:0 "We lost the war because of this demagogue and his liberal ideology.  He is even worse than Salamanca... there is only one thing we can do to save our country."
 bol_military_socialism:0 "Junta Militar"
 bol_military_socialism_desc:0 "The Military High Command is in charge of the country, now that people don't trust in liberals anymore, some new and radical ideologies appeared on the politic horizon."
 bol_political_turmoil:0 "Political Turmoil"
 bol_political_turmoil_desc:0 "Democracy was the cause of everything we did wrong in the past. Democracy is not viable in a disjointed country like Bolivia. We need to embrace new ideologies!"
 bol_left_wing:0 "Left-Wing"
 bol_left_wing_desc:0 "Left-Wing ideologies like Marxism, Leninism, Trotskyism are what we need for our government, an integrated government that takes into consideration every single bolivian in our country."
