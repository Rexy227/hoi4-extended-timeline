l_english:

 bol_blame_military_hc:0 "Blame the Military High Command"
 bol_blame_military_hc_desc:0 "If there is a reason why we lost the war its definitely because of the terrible and undisciplined military high command." 
 bol_the_only_reason:0 "There is Only One Reason"
 bol_the_only_reason_desc:0 "We lost the war because of this demagogue and his liberal ideology.  He is even worse than Salamanca... there is only one thing we can do to save our country."
 bol_military_socialism:0 "Junta Militar"
 bol_military_socialism_desc:0 "The Military High Command is in charge of the country, now that people don't trust in liberals anymore, some new and radical ideologies appeared on the politic horizon."
 bol_military_socialism2:0 "Socialismo Militar"
 bol_military_socialism2_desc:0 "'Socialismo Militar' is an 'ideology' that puts emphasis in co-government or keeping a political balance. Ideologies like communism, marxism, socialism, fascism, etc, are allowed but the 'Junta Militar' governs the country"
 bol_military_socialism3:0 "A New Leader"
 bol_military_socialism3_desc:0 "David Toro has been part of the Junta Militar for a long time, was part of the group that deposed Salamanca and Tejada, but lately the situation is getting out of hands. "
 bol_political_turmoil:0 "Political Turmoil"
 bol_political_turmoil_desc:0 "Democracy was the cause of everything we did wrong in the past. Democracy is not viable in a disjointed country like Bolivia. We need to embrace new ideologies!"
 bol_left_wing:0 "Left-Wing"
 bol_left_wing_desc:0 "Left-Wing ideologies like Marxism, Leninism, Trotskyism are what we need for our government, an integrated government that takes into consideration every single bolivian in our country."
 bol_workers_movement:0 "Partido Obrero Revolucionario"
 bol_workers_movement_desc:0 "asdsad"
 bol_far_right:0 "Nationalism"
 bol_far_right_desc:0 "kdmgksms"
 bol_falangism:0 "Falangism"
 bol_air_1:0 "Air Reinforcements"
 bol_air_1_desc:0 "We had planes during the Chaco War, but not a single air base near the conflict area and even though the war is 'over' we need to make sure our sky is  properly defended, as soon as possible, at any cost."
 bol_the_militias:0 "The Peasant Militias"
 bol_the_militias_desc:0 "Rebuilding the bolivian Armed Forces after our recent loss will take some time. Recruitment is a difficult task in these days, but we can encourage peasants and indigenous people to form militias, just in case we have to defend our country. This could also be the first step to the process of forming a proper army."
 